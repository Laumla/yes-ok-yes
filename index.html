<body style="margin:0; overflow:hidden;">

  <audio id="music" loop>
    <source src="music.mp3" type="audio/mpeg">
  </audio>

  <img id="trigger" src="theo.jpg" 
       style="width:100vw; height:100vh; object-fit:cover; cursor:pointer;">

  <script>
    document.getElementById("trigger").addEventListener("click", function() {

      const music = document.getElementById("music");

      // fullscreen
      document.documentElement.requestFullscreen().catch(() => {});

      let count = 0;
      const maxWindows = 20000;

      const interval = setInterval(() => {

        const left = Math.floor(Math.random() * 800);
        const top = Math.floor(Math.random() * 600);

        window.open(
          "theo.jpg",
          "_blank",
          `width=300,height=200,left=${left},top=${top}`
        );

        count++;

        if (count >= maxWindows) {
          clearInterval(interval);
        }

      }, 20);

      music.play().catch(() => {
        console.log("Autoplay blocked.");
      });

    });
  </script>

</body>
